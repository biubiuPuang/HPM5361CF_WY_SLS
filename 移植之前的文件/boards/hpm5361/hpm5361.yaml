      - qeiv2
      - linv2
      - dmav2
      - qeo
      - pwm
      - mmc
      - plb
      - dac
      - adc16
      - pdgo
      - mcan
      - ewdg
      - gpiom
      - tsns
      - crc
      - spi
      - i2c
      - ptp
